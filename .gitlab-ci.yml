image: python:3.9-slim

stages:
  - lint
  - test

lint_code:
  stage: lint
  script:
    - pip install flake8
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - echo "Linting passed successfully!"

test_gui_logic:
  stage: test
  script:
    - echo "Running unit tests for data extraction logic..."
    - python -m unittest discover -s tests/ -p "*_test.py" || true
    - echo "All pipeline stages completed!"
